<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Salary Hike Calculator</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="container">
    <h2>Salary Growth Calculator</h2>

    <label>Current Salary (₹)</label>
    <input type="number" id="currentSalary" placeholder="Enter current salary">

    <label>Hike % (per year)</label>
    <input type="number" id="hikePercent" placeholder="Enter hike percentage">

    <label>Desired Salary (₹)</label>
    <input type="number" id="desiredSalary" placeholder="Enter desired salary">

    <button onclick="calculateYears()">Calculate Years Needed</button>

    <div class="result" id="result"></div>
</div>

<footer>
    Made by <b>Lalit Singh Bisht 💔</b>
</footer>

<script src="/js/script.js"></script>

</body>
</html>
