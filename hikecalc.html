<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Salary Hike Calculator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #fff;
        padding: 30px;
    }
    .container {
        max-width: 450px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }
    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background: #0056b3;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .result {
        margin-top: 20px;
        padding: 15px;
        background: #e8f4ff;
        border-left: 4px solid #007bff;
        border-radius: 5px;
        font-size: 18px;
    }

    /* Footer Style + Pop In/Out Animation */
    footer {
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
        color: #444;
        opacity: 0;
        transform: scale(0.5);
        animation: popIn 1s forwards, popOut 2s infinite 2s;
    }

    @keyframes popIn {
        0% { opacity: 0; transform: scale(0.5); }
        100% { opacity: 1; transform: scale(1); }
    }

    @keyframes popOut {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.07); }
    }
</style>
</head>
<body>

<div class="container">
    <h2>Salary Growth Calculator</h2>

    <label>Current Salary (₹)</label>
    <input type="number" id="currentSalary" placeholder="Enter current salary">

    <label>Hike % (per year)</label>
    <input type="number" id="hikePercent" placeholder="Enter hike percentage">

    <label>Desired Salary (₹)</label>
    <input type="number" id="desiredSalary" placeholder="Enter desired salary">

    <button onclick="calculateYears()">Calculate Years Needed</button>

    <div class="result" id="result"></div>
</div>

<footer>
    Made by <b>Lalit Singh Bisht 💔</b>
</footer>

<script>
function calculateYears() {
    let current = parseFloat(document.getElementById("currentSalary").value);
    let hike = parseFloat(document.getElementById("hikePercent").value);
    let desired = parseFloat(document.getElementById("desiredSalary").value);

    if (!current || !hike || !desired || current <= 0 || desired <= 0) {
        document.getElementById("result").innerHTML = "Please enter valid values.";
        return;
    }

    let growthFactor = 1 + (hike / 100);
    let years = Math.log(desired / current) / Math.log(growthFactor);
    let roundedYears = years.toFixed(2);

    document.getElementById("result").innerHTML =
        "Years Required: <b>" + roundedYears + "</b>";
}
</script>

</body>
</html>
